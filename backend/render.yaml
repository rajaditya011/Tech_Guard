services:
  - type: web
    name: homeguardian-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.x
      - key: DEMO_MODE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: homeguardian-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
